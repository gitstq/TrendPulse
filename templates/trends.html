<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热点列表 - {{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="gradient-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                    <span class="text-xl font-bold">{{ app_name }}</span>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="/" class="hover:text-gray-200 transition">首页</a>
                    <a href="/dashboard" class="hover:text-gray-200 transition">仪表盘</a>
                    <a href="/trends" class="font-semibold border-b-2 border-white">热点</a>
                    <a href="/analytics" class="hover:text-gray-200 transition">分析</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🔥 热点列表</h1>
            <p class="text-gray-600 mt-1">浏览和筛选全网热点资讯</p>
        </div>

        <!-- 筛选栏 -->
        <div class="bg-white rounded-xl p-6 shadow-lg mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">平台</label>
                    <select id="filter-platform" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="">全部平台</option>
                        <option value="weibo">微博</option>
                        <option value="zhihu">知乎</option>
                        <option value="baidu">百度</option>
                        <option value="bilibili">B站</option>
                        <option value="toutiao">头条</option>
                        <option value="douyin">抖音</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">情感</label>
                    <select id="filter-sentiment" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="">全部情感</option>
                        <option value="positive">正面</option>
                        <option value="negative">负面</option>
                        <option value="neutral">中性</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">关键词</label>
                    <input type="text" id="filter-keyword" placeholder="输入关键词..." 
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">时间范围</label>
                    <select id="filter-days" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="1">最近1天</option>
                        <option value="3">最近3天</option>
                        <option value="7" selected>最近7天</option>
                        <option value="14">最近14天</option>
                        <option value="30">最近30天</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="applyFilters()" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition">
                    应用筛选
                </button>
            </div>
        </div>

        <!-- 热点列表 -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold">热点数据</h3>
                <div class="flex space-x-2">
                    <button onclick="loadTrends('hot')" class="px-4 py-2 text-sm bg-orange-100 text-orange-700 rounded-lg hover:bg-orange-200 transition">
                        🔥 最热
                    </button>
                    <button onclick="loadTrends('latest')" class="px-4 py-2 text-sm bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition">
                        🕐 最新
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">排名</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">平台</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">标题</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">关键词</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">情感</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">热度</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">时间</th>
                        </tr>
                    </thead>
                    <tbody id="trends-table" class="divide-y divide-gray-200">
                        <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>
            <!-- 分页 -->
            <div class="p-6 border-t border-gray-200 flex justify-between items-center">
                <p class="text-sm text-gray-600" id="pagination-info">显示 0 条数据</p>
                <div class="flex space-x-2">
                    <button onclick="prevPage()" id="btn-prev" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50" disabled>
                        上一页
                    </button>
                    <button onclick="nextPage()" id="btn-next" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50" disabled>
                        下一页
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 0;
        const pageSize = 20;
        let currentSort = 'latest';

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            loadTrends('latest');
        });

        // 加载热点数据
        async function loadTrends(sort = 'latest') {
            currentSort = sort;
            const platform = document.getElementById('filter-platform').value;
            const sentiment = document.getElementById('filter-sentiment').value;
            const keyword = document.getElementById('filter-keyword').value;
            const days = document.getElementById('filter-days').value;

            let url;
            if (sort === 'hot') {
                url = `/api/trends/hot?limit=${pageSize}&offset=${currentPage * pageSize}`;
            } else {
                url = `/api/trends?days=${days}&limit=${pageSize}&offset=${currentPage * pageSize}`;
                if (platform) url += `&platform=${platform}`;
                if (sentiment) url += `&sentiment=${sentiment}`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                renderTrends(data);
                updatePagination(data.length);
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 渲染热点列表
        function renderTrends(items) {
            const tbody = document.getElementById('trends-table');
            if (items.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-12 text-center text-gray-500">
                            暂无数据
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = items.map((item, index) => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full ${getRankClass(item.rank)} text-sm font-bold">
                            ${item.rank || '-'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                            ${getPlatformName(item.platform)}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <a href="${item.url || '#' }" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium line-clamp-2">
                            ${item.title}
                        </a>
                        ${item.summary ? `<p class="text-sm text-gray-500 mt-1 line-clamp-2">${item.summary}</p>` : ''}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${item.keywords ? item.keywords.split(',').map(kw => 
                            `<span class="inline-block bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded mr-1 mb-1">${kw.trim()}</span>`
                        ).join('') : '-'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getSentimentClass(item.sentiment)}">
                            ${getSentimentName(item.sentiment)}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="w-16 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="bg-orange-500 h-2 rounded-full" style="width: ${Math.min(item.hot_score, 100)}%"></div>
                            </div>
                            <span class="text-sm text-gray-600">${Math.round(item.hot_score)}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${formatTime(item.created_at)}
                    </td>
                </tr>
            `).join('');
        }

        // 更新分页
        function updatePagination(itemCount) {
            document.getElementById('pagination-info').textContent = 
                `显示 ${currentPage * pageSize + 1}-${currentPage * pageSize + itemCount} 条数据`;
            document.getElementById('btn-prev').disabled = currentPage === 0;
            document.getElementById('btn-next').disabled = itemCount < pageSize;
        }

        // 上一页
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                loadTrends(currentSort);
            }
        }

        // 下一页
        function nextPage() {
            currentPage++;
            loadTrends(currentSort);
        }

        // 应用筛选
        function applyFilters() {
            currentPage = 0;
            loadTrends(currentSort);
        }

        // 辅助函数
        function getPlatformName(platform) {
            const names = {
                'weibo': '微博',
                'zhihu': '知乎',
                'baidu': '百度',
                'bilibili': 'B站',
                'toutiao': '头条',
                'douyin': '抖音'
            };
            return names[platform] || platform;
        }

        function getSentimentName(sentiment) {
            const names = {
                'positive': '正面',
                'negative': '负面',
                'neutral': '中性'
            };
            return names[sentiment] || sentiment;
        }

        function getSentimentClass(sentiment) {
            const classes = {
                'positive': 'bg-green-100 text-green-800',
                'negative': 'bg-red-100 text-red-800',
                'neutral': 'bg-gray-100 text-gray-800'
            };
            return classes[sentiment] || 'bg-gray-100 text-gray-800';
        }

        function getRankClass(rank) {
            if (rank === 1) return 'bg-yellow-400 text-white';
            if (rank === 2) return 'bg-gray-400 text-white';
            if (rank === 3) return 'bg-orange-400 text-white';
            return 'bg-gray-100 text-gray-600';
        }

        function formatTime(timeStr) {
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', { 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }
    </script>
</body>
</html>
