<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析 - {{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="gradient-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                    <span class="text-xl font-bold">{{ app_name }}</span>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="/" class="hover:text-gray-200 transition">首页</a>
                    <a href="/dashboard" class="hover:text-gray-200 transition">仪表盘</a>
                    <a href="/trends" class="hover:text-gray-200 transition">热点</a>
                    <a href="/analytics" class="font-semibold border-b-2 border-white">分析</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📈 数据分析</h1>
            <p class="text-gray-600 mt-1">深度洞察热点趋势与情感分布</p>
        </div>

        <!-- 时间选择 -->
        <div class="bg-white rounded-xl p-4 shadow-lg mb-8">
            <div class="flex items-center space-x-4">
                <span class="text-gray-700 font-medium">时间范围:</span>
                <div class="flex space-x-2">
                    <button onclick="changeTimeRange(1)" class="time-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-days="1">1天</button>
                    <button onclick="changeTimeRange(7)" class="time-btn px-4 py-2 rounded-lg text-sm font-medium transition bg-purple-600 text-white" data-days="7">7天</button>
                    <button onclick="changeTimeRange(14)" class="time-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-days="14">14天</button>
                    <button onclick="changeTimeRange(30)" class="time-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-days="30">30天</button>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- 平台分布 -->
            <div class="bg-white rounded-xl p-6 shadow-lg">
                <h3 class="text-lg font-semibold mb-4">📱 平台分布</h3>
                <canvas id="platformChart" height="250"></canvas>
            </div>

            <!-- 情感分布 -->
            <div class="bg-white rounded-xl p-6 shadow-lg">
                <h3 class="text-lg font-semibold mb-4">💭 情感分布</h3>
                <canvas id="sentimentChart" height="250"></canvas>
            </div>
        </div>

        <!-- 趋势图 -->
        <div class="bg-white rounded-xl p-6 shadow-lg mb-8">
            <h3 class="text-lg font-semibold mb-4">📊 趋势变化</h3>
            <canvas id="trendChart" height="100"></canvas>
        </div>

        <!-- 热门关键词 -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-200">
                <h3 class="text-lg font-semibold">🔥 热门关键词 TOP 20</h3>
            </div>
            <div class="p-6">
                <div id="keywords-cloud" class="flex flex-wrap gap-3">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>

        <!-- 详细统计 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl p-6 shadow-lg">
                <h4 class="text-gray-500 text-sm mb-2">正面情感占比</h4>
                <p class="text-3xl font-bold text-green-600" id="positive-percent">-</p>
                <div class="mt-2 w-full bg-gray-200 rounded-full h-2">
                    <div id="positive-bar" class="bg-green-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-lg">
                <h4 class="text-gray-500 text-sm mb-2">负面情感占比</h4>
                <p class="text-3xl font-bold text-red-600" id="negative-percent">-</p>
                <div class="mt-2 w-full bg-gray-200 rounded-full h-2">
                    <div id="negative-bar" class="bg-red-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-lg">
                <h4 class="text-gray-500 text-sm mb-2">中性情感占比</h4>
                <p class="text-3xl font-bold text-gray-600" id="neutral-percent">-</p>
                <div class="mt-2 w-full bg-gray-200 rounded-full h-2">
                    <div id="neutral-bar" class="bg-gray-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDays = 7;
        let charts = {};

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            loadAnalyticsData();
        });

        // 切换时间范围
        function changeTimeRange(days) {
            currentDays = days;
            
            // 更新按钮样式
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('bg-purple-600', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-700');
            });
            document.querySelector(`[data-days="${days}"]`).classList.add('bg-purple-600', 'text-white');
            document.querySelector(`[data-days="${days}"]`).classList.remove('bg-gray-100', 'text-gray-700');
            
            loadAnalyticsData();
        }

        // 加载分析数据
        async function loadAnalyticsData() {
            try {
                // 加载统计数据
                const statsResponse = await fetch(`/api/stats?days=${currentDays}`);
                const statsData = await statsResponse.json();
                
                // 加载关键词
                const keywordsResponse = await fetch(`/api/stats/keywords?limit=20&days=${currentDays}`);
                const keywordsData = await keywordsResponse.json();
                
                // 加载小时趋势
                const hourlyResponse = await fetch(`/api/stats/hourly?days=${currentDays > 7 ? 7 : currentDays}`);
                const hourlyData = await hourlyResponse.json();
                
                // 更新图表
                updatePlatformChart(statsData.platform_stats);
                updateSentimentChart(statsData.sentiment_stats);
                updateTrendChart(hourlyData);
                
                // 更新关键词云
                renderKeywordsCloud(keywordsData);
                
                // 更新情感百分比
                updateSentimentPercentages(statsData.sentiment_stats);
                
            } catch (error) {
                console.error('加载分析数据失败:', error);
            }
        }

        // 更新平台分布图
        function updatePlatformChart(platformStats) {
            const ctx = document.getElementById('platformChart').getContext('2d');
            
            if (charts.platform) {
                charts.platform.destroy();
            }
            
            const labels = Object.keys(platformStats).map(getPlatformName);
            const data = Object.values(platformStats);
            
            charts.platform = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '热点数量',
                        data: data,
                        backgroundColor: [
                            '#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // 更新情感分布图
        function updateSentimentChart(sentimentStats) {
            const ctx = document.getElementById('sentimentChart').getContext('2d');
            
            if (charts.sentiment) {
                charts.sentiment.destroy();
            }
            
            const labels = ['positive', 'negative', 'neutral'].map(getSentimentName);
            const data = [
                sentimentStats.positive || 0,
                sentimentStats.negative || 0,
                sentimentStats.neutral || 0
            ];
            
            charts.sentiment = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#10B981', '#EF4444', '#6B7280']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        // 更新趋势图
        function updateTrendChart(hourlyData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (charts.trend) {
                charts.trend.destroy();
            }
            
            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hourlyData.map(h => h.hour + ':00'),
                    datasets: [{
                        label: '热点数量',
                        data: hourlyData.map(h => h.count),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // 渲染关键词云
        function renderKeywordsCloud(keywords) {
            const container = document.getElementById('keywords-cloud');
            
            if (keywords.length === 0) {
                container.innerHTML = '<p class="text-gray-500">暂无数据</p>';
                return;
            }
            
            const maxCount = Math.max(...keywords.map(k => k.count));
            
            container.innerHTML = keywords.map(kw => {
                const size = 0.8 + (kw.count / maxCount) * 1.5;
                const opacity = 0.6 + (kw.count / maxCount) * 0.4;
                return `
                    <span class="inline-block px-3 py-1 rounded-full text-white font-medium cursor-pointer hover:opacity-80 transition"
                        style="background-color: hsl(${Math.random() * 360}, 70%, 50%); font-size: ${size}rem; opacity: ${opacity}">
                        ${kw.keyword}
                        <span class="ml-1 text-xs opacity-75">${kw.count}</span>
                    </span>
                `;
            }).join('');
        }

        // 更新情感百分比
        function updateSentimentPercentages(sentimentStats) {
            const positive = sentimentStats.positive || 0;
            const negative = sentimentStats.negative || 0;
            const neutral = sentimentStats.neutral || 0;
            const total = positive + negative + neutral;
            
            if (total === 0) return;
            
            const positivePercent = ((positive / total) * 100).toFixed(1);
            const negativePercent = ((negative / total) * 100).toFixed(1);
            const neutralPercent = ((neutral / total) * 100).toFixed(1);
            
            document.getElementById('positive-percent').textContent = positivePercent + '%';
            document.getElementById('negative-percent').textContent = negativePercent + '%';
            document.getElementById('neutral-percent').textContent = neutralPercent + '%';
            
            document.getElementById('positive-bar').style.width = positivePercent + '%';
            document.getElementById('negative-bar').style.width = negativePercent + '%';
            document.getElementById('neutral-bar').style.width = neutralPercent + '%';
        }

        // 辅助函数
        function getPlatformName(platform) {
            const names = {
                'weibo': '微博',
                'zhihu': '知乎',
                'baidu': '百度',
                'bilibili': 'B站',
                'toutiao': '头条',
                'douyin': '抖音'
            };
            return names[platform] || platform;
        }

        function getSentimentName(sentiment) {
            const names = {
                'positive': '正面',
                'negative': '负面',
                'neutral': '中性'
            };
            return names[sentiment] || sentiment;
        }
    </script>
</body>
</html>
