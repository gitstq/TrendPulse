{% extends "base.html" %}

{% block title %}热点列表 - TrendPulse{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="page-header">
    <h1 class="page-title">🔥 热点列表</h1>
    <p class="page-subtitle">查看和管理所有热点数据</p>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
    <div class="filter-group">
        <label class="filter-label">平台：</label>
        <select class="filter-select" id="platformFilter" onchange="filterTrends()">
            <option value="">全部平台</option>
            <option value="zhihu">知乎</option>
            <option value="weibo">微博</option>
            <option value="bilibili">B站</option>
            <option value="github">GitHub</option>
            <option value="hackernews">HackerNews</option>
        </select>
    </div>
    <div class="filter-group">
        <label class="filter-label">情感：</label>
        <select class="filter-select" id="sentimentFilter" onchange="filterTrends()">
            <option value="">全部</option>
            <option value="positive">正面</option>
            <option value="negative">负面</option>
            <option value="neutral">中性</option>
            <option value="mixed">混合</option>
        </select>
    </div>
    <div class="filter-group">
        <label class="filter-label">优先级：</label>
        <select class="filter-select" id="priorityFilter" onchange="filterTrends()">
            <option value="">全部</option>
            <option value="high">高</option>
            <option value="medium">中</option>
            <option value="low">低</option>
        </select>
    </div>
    <div class="filter-group">
        <label class="filter-label">状态：</label>
        <select class="filter-select" id="statusFilter" onchange="filterTrends()">
            <option value="">全部</option>
            <option value="analyzed">已分析</option>
            <option value="unanalyzed">未分析</option>
            <option value="notified">已通知</option>
            <option value="unnotified">未通知</option>
        </select>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索热点标题..." onkeyup="handleSearch(event)">
    </div>
</div>

<!-- 热点列表 -->
<div class="card">
    <div class="card-header">
        <h3 class="card-title">共 <span id="totalCount">0</span> 条热点</h3>
    </div>
    <div class="card-body">
        <div id="trendList" class="trend-list">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<!-- 分页 -->
<div class="pagination" id="pagination"></div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
const pageSize = 20;

async function loadTrends(page = 1) {
    currentPage = page;
    const trendList = document.getElementById('trendList');
    const totalCount = document.getElementById('totalCount');
    
    // 显示加载状态
    trendList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    
    // 获取筛选参数
    const platform = document.getElementById('platformFilter').value;
    const sentiment = document.getElementById('sentimentFilter').value;
    const priority = document.getElementById('priorityFilter').value;
    const status = document.getElementById('statusFilter').value;
    const search = document.getElementById('searchInput').value;
    
    // 构建查询参数
    const params = new URLSearchParams({
        page: page,
        limit: pageSize,
    });
    
    if (platform) params.append('platform', platform);
    if (sentiment) params.append('sentiment', sentiment);
    if (priority) params.append('priority', priority);
    if (search) params.append('search', search);
    
    if (status === 'analyzed') params.append('analyzed', 'true');
    else if (status === 'unanalyzed') params.append('analyzed', 'false');
    if (status === 'notified') params.append('notified', 'true');
    else if (status === 'unnotified') params.append('notified', 'false');
    
    try {
        const response = await fetch('/api/trends?' + params.toString());
        const result = await response.json();
        
        totalCount.textContent = result.total;
        
        if (result.items && result.items.length > 0) {
            renderTrends(result.items);
            renderPagination(result.total, page);
        } else {
            trendList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-title">暂无数据</div>
                    <div class="empty-desc">没有找到符合条件的热点数据</div>
                </div>
            `;
            document.getElementById('pagination').innerHTML = '';
        }
    } catch (error) {
        trendList.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">❌</div>
                <div class="empty-title">加载失败</div>
                <div class="empty-desc">${error.message}</div>
            </div>
        `;
    }
}

function renderTrends(items) {
    const trendList = document.getElementById('trendList');
    
    trendList.innerHTML = items.map(item => `
        <div class="trend-item">
            <div class="trend-header">
                <a href="${item.url || '#'}" target="_blank" class="trend-title">${escapeHtml(item.title)}</a>
                <span class="platform-badge platform-${item.platform}">${item.platform.toUpperCase()}</span>
            </div>
            <div class="trend-meta">
                <span class="trend-meta-item">📊 ${item.hot_score}</span>
                ${item.sentiment ? `
                    <span class="trend-meta-item sentiment-${item.sentiment}">
                        ${getSentimentEmoji(item.sentiment)} ${item.sentiment}
                    </span>
                ` : ''}
                ${item.priority ? `
                    <span class="trend-meta-item priority-${item.priority}">
                        ${getPriorityEmoji(item.priority)} ${item.priority}
                    </span>
                ` : ''}
                <span class="trend-meta-item">🕐 ${formatDate(item.created_at)}</span>
                ${item.analyzed_at ? `<span class="trend-meta-item">✅ 已分析</span>` : '<span class="trend-meta-item">⏳ 待分析</span>'}
            </div>
            ${item.summary ? `<div class="trend-summary">${escapeHtml(item.summary)}</div>` : ''}
            ${item.keywords && item.keywords.length > 0 ? `
                <div class="trend-tags">
                    ${item.keywords.slice(0, 5).map(k => `<span class="badge badge-blue">${escapeHtml(k)}</span>`).join('')}
                </div>
            ` : ''}
        </div>
    `).join('');
}

function renderPagination(total, currentPage) {
    const pagination = document.getElementById('pagination');
    const totalPages = Math.ceil(total / pageSize);
    
    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    
    // 上一页
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadTrends(${currentPage - 1})">上一页</button>`;
    
    // 页码
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadTrends(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
            html += '<span style="padding: 8px;">...</span>';
        }
    }
    
    // 下一页
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadTrends(${currentPage + 1})">下一页</button>`;
    
    pagination.innerHTML = html;
}

function filterTrends() {
    loadTrends(1);
}

function handleSearch(event) {
    if (event.key === 'Enter') {
        loadTrends(1);
    }
}

function getSentimentEmoji(sentiment) {
    const map = { positive: '😊', negative: '😔', neutral: '😐', mixed: '🤔' };
    return map[sentiment] || '😐';
}

function getPriorityEmoji(priority) {
    const map = { high: '🔴', medium: '🟡', low: '🟢' };
    return map[priority] || '⚪';
}

function formatDate(dateStr) {
    if (!dateStr) return 'N/A';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 页面加载时获取数据
document.addEventListener('DOMContentLoaded', () => loadTrends(1));
</script>
{% endblock %}
