<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrendPulse{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="/" class="logo">
                    <div class="logo-icon">🔥</div>
                    <span>TrendPulse</span>
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">仪表盘</a>
                    <a href="/trends" class="nav-link {% if request.url.path == '/trends' %}active{% endif %}">热点列表</a>
                    <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">设置</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
