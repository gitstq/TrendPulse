version: '3.8'

services:
  trendpulse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trendpulse
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ../config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ../.env
    networks:
      - trendpulse-network

networks:
  trendpulse-network:
    driver: bridge
