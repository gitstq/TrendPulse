# TrendPulse Docker Compose 配置
version: '3.8'

services:
  trendpulse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trendpulse
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - TRENDPULSE_DB_URL=sqlite:///./data/trendpulse.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
